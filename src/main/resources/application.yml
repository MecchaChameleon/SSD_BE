server:
  port: ${PORT:8080}

spring:
  application:
    name: jeju-localtime-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jeju_localtime}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET:local-dev-only-secret-key-change-me-32bytes-min}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
