server:
  port: ${PORT:8080}

spring:
  application:
    name: jeju-localtime-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jeju_localtime}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 2


management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET:local-dev-only-secret-key-change-me-32bytes-min}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# AI 추천 할인가/판매 전략 서버(FastAPI)는 별도 Render Hobby 워크스페이스에 배포한다.
# Render에서는 AI_SERVICE_BASE_URL에 AI의 공개 onrender.com 주소를 넣고,
# 로컬 개발에서는 환경변수를 생략해 http://localhost:9000을 사용한다.
ai:
  service:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:9000}
    api-key: ${AI_SERVICE_API_KEY:}
  pricing:
    interval-ms: ${AI_PRICING_INTERVAL_MS:600000}

# 국세청 사업자등록정보 진위확인 및 상태조회 (공공데이터포털)
nts:
  base-url: ${NTS_BASE_URL:https://api.odcloud.kr/api/nts-businessman/v1}
  service-key: ${NTS_SERVICE_KEY:}

# 상품 이미지 업로드 임시 저장소(LocalFileStorage). TODO: S3 연동 후 제거.
file-storage:
  type: ${FILE_STORAGE_TYPE:local}
  local:
    root-dir: ${FILE_STORAGE_ROOT_DIR:./uploads}
    public-base-url: ${FILE_STORAGE_PUBLIC_BASE_URL:/uploads}
  s3:
    region: ${AWS_REGION:ap-northeast-2}
    bucket: ${S3_BUCKET:}
    public-base-url: ${S3_PUBLIC_BASE_URL:}

spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 30MB

# 데모/QA용 더미 상품 20개를 항상 노출 상태로 유지하는 스케줄러(DummyProductSeeder).
# 서버 시작 시 1회 + 매일 cron 시각에 상품 만료 시간을 오늘 기준으로 되돌린다.
# 끄려면 환경변수 DUMMY_DATA_ENABLED=false 로 설정.
dummy-data:
  enabled: ${DUMMY_DATA_ENABLED:true}
  cron: ${DUMMY_DATA_CRON:0 5 0 * * *}

# 더미 상품 사진(src/main/resources/static/dummy-images/*)에 접근할 때 붙일 절대 URL.
# 커스텀 도메인을 쓰거나 Render 서비스명이 바뀌면 APP_PUBLIC_BASE_URL로 덮어쓸 것.
app:
  public-base-url: ${APP_PUBLIC_BASE_URL:https://jeju-localtime-api.onrender.com}

