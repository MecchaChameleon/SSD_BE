server:
  port: ${PORT:8080}

spring:
  application:
    name: jeju-localtime-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jeju_localtime}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 2


management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET:local-dev-only-secret-key-change-me-32bytes-min}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# AI 추천 할인가/판매 전략 서버(FastAPI, AI 파트가 별도 배포). 아직 실제 주소/경로 확정 전이라
# 로컬 기본값은 임시로 넣어뒀다. TODO: 배포 주소 확정되면 AI_SERVICE_BASE_URL 환경변수로 주입.
ai:
  service:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:9000}

# 국세청 사업자등록정보 진위확인 및 상태조회 (공공데이터포털)
nts:
  base-url: ${NTS_BASE_URL:https://api.odcloud.kr/api/nts-businessman/v1}
  service-key: ${NTS_SERVICE_KEY:}

# 상품 이미지 업로드 임시 저장소(LocalFileStorage). TODO: S3 연동 후 제거.
file-storage:
  type: ${FILE_STORAGE_TYPE:local}
  local:
    root-dir: ${FILE_STORAGE_ROOT_DIR:./uploads}
    public-base-url: ${FILE_STORAGE_PUBLIC_BASE_URL:/uploads}
  s3:
    region: ${AWS_REGION:ap-northeast-2}
    bucket: ${S3_BUCKET:}
    public-base-url: ${S3_PUBLIC_BASE_URL:}

spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 30MB

