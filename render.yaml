databases:
  - name: jeju-localtime-db
    plan: free
    databaseName: jeju_localtime
    user: jeju_admin

services:
  - type: web
    name: jeju-localtime-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: jeju-localtime-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: jeju-localtime-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: jeju-localtime-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: jeju-localtime-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: jeju-localtime-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      # 별도 Hobby 워크스페이스에 배포한 AI의 공개 주소
      - key: AI_SERVICE_BASE_URL
        value: https://jeju-localtime-ai.onrender.com
      # AI 워크스페이스의 AI_SERVICE_API_KEY와 반드시 같은 값
      - key: AI_SERVICE_API_KEY
        sync: false
      # 더미 상품은 매일 한국시간 00:05에 당일 판매 구간(00:05~23:55)으로 갱신
      - key: DUMMY_DATA_CRON
        value: "0 5 0 * * *"
      # 아래는 값을 Blueprint가 관리하지 않고(sync: false) Render 대시보드에서 직접 입력한다.
      # 상품 이미지 업로드(S3FileStorage) 사용에 필요.
      - key: FILE_STORAGE_TYPE
        value: s3
      - key: S3_BUCKET
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      # 커스텀 도메인/CDN을 안 쓰면 비워둬도 됨 (기본값: https://{bucket}.s3.{region}.amazonaws.com)
      - key: S3_PUBLIC_BASE_URL
        sync: false
